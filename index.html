<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👠 Sondha's REVENGE — ULTIMATE</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&display=swap" rel="stylesheet">
<style>
/* ========= ROOT VARIABLES ========= */
:root {
  --hot-pink: #ff0088;
  --neon-pink: #ff4dac;
  --pale-pink: #ffb3d9;
  --yellow: #ffe44d;
  --orange: #ff7800;
  --cyan: #00ffe5;
  --purple: #b400ff;
  --deep: #07000f;
  --bg: #0d0020;
}

/* ========= RESET ========= */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ========= BODY ========= */
body {
  font-family: 'Boogaloo', cursive;
  background: var(--bg);
  overflow: hidden;
  height: 100vh; width: 100vw;
  cursor: none;
  user-select: none;
}

/* ========= SCREEN SHAKE ========= */
@keyframes screenShake {
  0%   { transform:translate(0,0); }
  12%  { transform:translate(-10px,-6px) rotate(-0.5deg); }
  25%  { transform:translate(11px,6px) rotate(0.5deg); }
  37%  { transform:translate(-8px,8px) rotate(-0.3deg); }
  50%  { transform:translate(8px,-8px) rotate(0.3deg); }
  62%  { transform:translate(-4px,4px); }
  75%  { transform:translate(4px,-4px); }
  87%  { transform:translate(-2px,2px); }
  100% { transform:translate(0,0); }
}
body.shaking { animation: screenShake 0.42s cubic-bezier(0.36,0.07,0.19,0.97); }

/* ========= FLASH OVERLAY ========= */
#flash {
  position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0;
}
#flash.do-flash {
  animation: flashOut 0.28s ease-out forwards;
}
@keyframes flashOut {
  0%   { opacity: 1;  background: rgba(255,0,120,0.3); }
  100% { opacity: 0; }
}

/* ========= BACKGROUND ========= */
#bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: radial-gradient(ellipse at 25% 0%, rgba(120,0,200,0.4) 0%, transparent 55%),
              radial-gradient(ellipse at 75% 0%, rgba(255,0,100,0.25) 0%, transparent 55%),
              linear-gradient(to bottom, #050010 0%, #0d0020 55%, #160032 100%);
}

/* Stars */
.star {
  position: absolute; border-radius: 50%;
  background: white;
  animation: twinkle var(--d,2s) var(--dl,0s) infinite alternate;
}
@keyframes twinkle {
  from { opacity:0.1; transform:scale(0.7); }
  to   { opacity:1;   transform:scale(1.4); }
}

/* ---- CITY SVG ---- */
#city-svg {
  position: absolute;
  bottom: 0; left: 0; width: 100%; min-height: 300px;
}

/* Neon sign blink */
.blink-a { animation: blinkA 1.4s step-end infinite; }
.blink-b { animation: blinkB 2.1s step-end infinite; }
.blink-c { animation: blinkC 0.9s step-end infinite; }
@keyframes blinkA { 0%,85%{opacity:1} 86%,90%{opacity:0} 91%{opacity:1} }
@keyframes blinkB { 0%,70%{opacity:1} 71%,76%{opacity:0} 77%{opacity:1} }
@keyframes blinkC { 0%,60%{opacity:1} 61%,63%{opacity:0} 64%{opacity:1} }

/* Spotlight beams */
.spotlight {
  position: absolute; bottom: 70px;
  width: 0; height: 0;
  border-left: 55px solid transparent;
  border-right: 55px solid transparent;
  border-bottom: 380px solid rgba(255,77,180,0.055);
  transform-origin: bottom center;
  filter: blur(8px);
}
.sp1 { left: 14%; animation: sp1 7s ease-in-out infinite alternate; }
.sp2 { left: 72%; animation: sp2 10s ease-in-out infinite alternate; }
@keyframes sp1 { from{transform:rotate(-30deg)} to{transform:rotate(14deg)} }
@keyframes sp2 { from{transform:rotate(-14deg)} to{transform:rotate(30deg)} }

/* ========= GAME CONTAINER ========= */
#game-container {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}

/* ========= TITLE BAR ========= */
#title-bar { text-align: center; padding: 14px 0 3px; z-index: 10; }
#title-bar h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(2.3rem, 5.5vw, 4.6rem);
  letter-spacing: 6px;
  color: var(--yellow);
  text-shadow:
    0 0 12px rgba(255,228,77,0.9),
    0 0 28px rgba(255,228,77,0.5),
    4px 4px 0 var(--hot-pink),
    8px 8px 0 rgba(0,0,0,0.55);
  animation: titlePulse 2s ease-in-out infinite alternate;
}
@keyframes titlePulse {
  from { text-shadow: 0 0 10px rgba(255,228,77,.8),0 0 22px rgba(255,228,77,.4),4px 4px 0 var(--hot-pink),8px 8px 0 rgba(0,0,0,.5); }
  to   { text-shadow: 0 0 22px rgba(255,228,77,1),0 0 44px rgba(255,228,77,.7),4px 4px 0 var(--hot-pink),8px 8px 0 rgba(0,0,0,.5); }
}
.subtitle {
  font-size: clamp(0.8rem, 1.8vw, 1.05rem);
  color: var(--pale-pink);
  letter-spacing: 2px; font-weight: 700; margin-top: 3px;
  text-shadow: 0 0 10px rgba(255,179,217,.5);
}

/* ========= HUD SCORE ========= */
#score-bar {
  display: flex; gap: 14px; align-items: center;
  margin: 6px 0 0; z-index: 10;
}
.score-box {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,77,172,0.45);
  border-radius: 18px;
  padding: 5px 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 14px rgba(255,77,172,0.18), inset 0 0 10px rgba(255,77,172,0.04);
}
.score-label {
  font-size: 0.58rem; color: var(--pale-pink);
  text-transform: uppercase; letter-spacing: 2.5px; font-weight: 700;
}
.score-value {
  font-family: 'Bangers', cursive;
  font-size: 1.85rem; color: var(--yellow);
  letter-spacing: 2px; line-height: 1.1;
  text-shadow: 0 0 10px rgba(255,228,77,.55);
}

/* ========= ARENA ========= */
#arena {
  position: relative; flex: 1; width: 100%; overflow: hidden;
}

/* GROUND */
#ground {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 88px; z-index: 2;
  background: linear-gradient(to bottom, #1e0040 0%, #140030 50%, #0a0020 100%);
  border-top: 2px solid var(--hot-pink);
  box-shadow: 0 -6px 35px rgba(255,0,120,.45), 0 -20px 70px rgba(255,0,120,.12);
}
#ground::before {
  content: '';
  position: absolute; top: -2px; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg,
    transparent 0%, var(--hot-pink) 20%, var(--yellow) 40%,
    var(--cyan) 60%, var(--hot-pink) 80%, transparent 100%);
  animation: groundGlow 3s linear infinite;
  background-size: 200% 100%;
}
@keyframes groundGlow {
  from { background-position: -100% 0; }
  to   { background-position: 100% 0; }
}
#ground::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg,
    rgba(255,0,120,.07) 0px, transparent 1px,
    transparent 90px, rgba(255,0,120,.07) 91px);
}

/* ========= CHARACTERS ========= */
.character {
  position: absolute; bottom: 88px;
  display: flex; flex-direction: column; align-items: center;
  cursor: crosshair; z-index: 5;
  transform: translateX(-50%);
  animation: idle 2.2s ease-in-out infinite alternate;
}
@keyframes idle {
  from { transform: translateX(-50%) translateY(0); }
  to   { transform: translateX(-50%) translateY(-14px); }
}

.character.hit {
  animation: charHit 0.42s cubic-bezier(.36,.07,.19,.97) !important;
  filter: brightness(2.8) saturate(0.4) !important;
}
@keyframes charHit {
  0%  { transform:translateX(-50%) translateY(0) rotate(0) scale(1); }
  12% { transform:translateX(calc(-50% - 22px)) translateY(-8px) rotate(-14deg) scale(.82); }
  28% { transform:translateX(calc(-50% + 22px)) translateY(-10px) rotate(12deg) scale(1.18); }
  44% { transform:translateX(calc(-50% - 15px)) translateY(-4px) rotate(-8deg) scale(.94); }
  60% { transform:translateX(calc(-50% + 15px)) translateY(-6px) rotate(8deg) scale(1.06); }
  75% { transform:translateX(calc(-50% - 7px)) rotate(-4deg); }
  88% { transform:translateX(calc(-50% + 7px)) rotate(4deg); }
  100%{ transform:translateX(-50%) translateY(0) rotate(0) scale(1); }
}

/* Pain face toggle */
.face-normal { transition: opacity 0.04s; }
.face-pain   { opacity:0; transition: opacity 0.04s; }
.character.hit .face-normal { opacity:0; }
.character.hit .face-pain   { opacity:1; }

.char-label {
  font-family: 'Bangers', cursive;
  font-size: 1.25rem; letter-spacing: 2px;
  padding: 5px 18px; border-radius: 22px; margin-bottom: 10px;
  border: 2px solid;
}
#playboy { left: 26%; }
#playboy .char-label {
  color: #ff4444; border-color: #ff4444;
  background: rgba(255,68,68,.1);
  text-shadow: 0 0 8px rgba(255,68,68,.6);
  box-shadow: 0 0 14px rgba(255,68,68,.18);
}
#suffering { left: 72%; }
#suffering .char-label {
  color: #a55cff; border-color: #a55cff;
  background: rgba(165,92,255,.1);
  text-shadow: 0 0 8px rgba(165,92,255,.6);
  box-shadow: 0 0 14px rgba(165,92,255,.18);
}
.char-svg { filter: drop-shadow(0 12px 22px rgba(0,0,0,.65)); transition: filter .2s; }
#playboy:hover .char-svg   { filter: drop-shadow(0 0 22px rgba(255,80,80,.75)) drop-shadow(0 12px 20px rgba(0,0,0,.5)); }
#suffering:hover .char-svg { filter: drop-shadow(0 0 22px rgba(165,92,255,.75)) drop-shadow(0 12px 20px rgba(0,0,0,.5)); }

/* ========= CURSOR ========= */
#shoe-cursor {
  position: fixed; pointer-events: none; z-index: 100;
  font-size: 2.9rem; transform: translate(-50%,-50%);
  filter: drop-shadow(0 0 10px rgba(255,0,120,.85)) drop-shadow(2px 2px 5px rgba(0,0,0,.7));
}
#shoe-cursor.swinging { animation: shoeSwing .26s ease-out; }
@keyframes shoeSwing {
  0%  { transform:translate(-50%,-50%) rotate(0) scale(1); }
  35% { transform:translate(-50%,-50%) rotate(58deg) scale(1.45); }
  65% { transform:translate(-50%,-50%) rotate(-26deg) scale(1.12); }
  100%{ transform:translate(-50%,-50%) rotate(0) scale(1); }
}

/* ========= AHH TEXT ========= */
.ahh-text {
  position: fixed; pointer-events: none; z-index: 35;
  font-family: 'Bangers', cursive;
  font-size: clamp(2.5rem,5.5vw,4.2rem);
  letter-spacing: 4px; white-space: nowrap;
  color: #ff3333;
  text-shadow:
    3px 3px 0 #800000,
    0 0 18px rgba(255,60,60,.9),
    0 0 36px rgba(255,60,60,.45);
  animation: ahhPop .85s ease-out forwards;
}
@keyframes ahhPop {
  0%  { opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(12deg); }
  18% { opacity:1; transform:translate(-50%,-80%) scale(1.7) rotate(-9deg); }
  50% { transform:translate(-50%,-165%) scale(1.25) rotate(4deg); opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-280%) scale(.9) rotate(0deg); }
}

/* ========= GROAN TEXT ========= */
.groan-text {
  position: fixed; pointer-events: none; z-index: 35;
  font-family: 'Bangers', cursive;
  font-size: clamp(2rem,4.5vw,3.5rem);
  letter-spacing: 3px; white-space: nowrap;
  color: #c878ff;
  text-shadow:
    3px 3px 0 #4b0082,
    0 0 16px rgba(180,0,255,.9),
    0 0 32px rgba(180,0,255,.4);
  animation: ahhPop .85s ease-out forwards;
}

/* ========= EFFECT WORDS ========= */
.effect-text {
  position: fixed; pointer-events: none; z-index: 30;
  font-family: 'Bangers', cursive;
  font-size: clamp(2rem,4.5vw,3.5rem);
  letter-spacing: 3px; white-space: nowrap;
  animation: effectPop .95s ease-out forwards;
}
@keyframes effectPop {
  0%  { opacity:1; transform:translate(-50%,-50%) scale(.4) rotate(-18deg); }
  22% { transform:translate(-50%,-135%) scale(1.45) rotate(9deg); }
  60% { transform:translate(-50%,-210%) scale(1.12) rotate(-4deg); opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-305%) scale(.75) rotate(0deg); }
}

/* ========= EMOTION BUBBLE ========= */
.emotion-bubble {
  position: absolute; top: -80px; left: 50%;
  transform: translateX(-50%);
  background: white; border-radius: 18px;
  padding: 7px 16px; font-size: .95rem; font-weight: 700;
  border: 2px solid #ddd;
  box-shadow: 0 4px 18px rgba(0,0,0,.3);
  opacity: 0; pointer-events: none; z-index: 20; white-space: nowrap;
}
.emotion-bubble::after {
  content: ''; position: absolute; bottom: -12px; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent; border-top-color: white;
}
.emotion-bubble.show { animation: bubblePop 1.3s ease forwards; }
@keyframes bubblePop {
  0%  { opacity:1; transform:translateX(-50%) scale(.4); }
  15% { transform:translateX(-50%) scale(1.25); }
  30% { transform:translateX(-50%) scale(1); }
  75% { opacity:1; }
  100%{ opacity:0; transform:translateX(-50%) scale(.8) translateY(-10px); }
}

/* ========= HIT STARS / PARTICLES ========= */
.hit-star {
  position: fixed; pointer-events: none;
  font-size: 1.9rem; z-index: 20;
  animation: starFly .78s ease-out forwards;
}
@keyframes starFly {
  from { opacity:1; transform:translate(0,0) scale(1) rotate(0deg); }
  to   { opacity:0; transform:translate(var(--tx),var(--ty)) scale(.15) rotate(780deg); }
}
.particle {
  position: fixed; pointer-events: none;
  border-radius: 50%; z-index: 15;
  animation: partFly var(--dur,.6s) ease-out forwards;
}
@keyframes partFly {
  from { opacity:1; transform:translate(0,0) scale(1); }
  to   { opacity:0; transform:translate(var(--px),var(--py)) scale(.1); }
}

/* ========= COMBO ========= */
#combo-display {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-family: 'Bangers', cursive;
  font-size: clamp(3.5rem,8vw,6rem);
  letter-spacing: 5px;
  pointer-events: none; opacity: 0; z-index: 50;
}
#combo-display.show { animation: comboFlash .9s cubic-bezier(.36,.07,.19,.97) forwards; }
@keyframes comboFlash {
  0%  { opacity:1; transform:translate(-50%,-50%) scale(.25) rotate(-6deg); }
  25% { transform:translate(-50%,-50%) scale(1.65) rotate(4deg); }
  60% { transform:translate(-50%,-50%) scale(1.2) rotate(-1deg); opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
}

/* ========= INTRO SCREEN ========= */
#intro {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 30px; overflow: hidden;
  background: radial-gradient(ellipse at 50% 40%, #280050 0%, #080012 72%);
}
#intro::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 18% 80%, rgba(255,0,120,.18) 0%, transparent 42%),
    radial-gradient(circle at 82% 18%, rgba(160,0,255,.18) 0%, transparent 42%);
}
.intro-shoe {
  font-size: clamp(5.5rem,13vw,10rem);
  display: block; margin-bottom: 18px;
  filter: drop-shadow(0 0 35px rgba(255,0,120,1)) drop-shadow(0 0 60px rgba(255,0,120,.5));
  animation: shoeIntro 1.6s ease-in-out infinite alternate; position: relative;
}
@keyframes shoeIntro {
  from { transform: rotate(-28deg) scale(.94); }
  to   { transform: rotate(28deg) scale(1.06); }
}
#intro h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(3.5rem,9vw,7rem);
  letter-spacing: 8px; line-height: 1; margin-bottom: 16px; position: relative;
  animation: titleBounce 1.8s ease-in-out infinite alternate;
}
@keyframes titleBounce {
  from { transform: translateY(0) rotate(-1.5deg) scale(1); }
  to   { transform: translateY(-12px) rotate(1.5deg) scale(1.02); }
}
.t-main {
  display: block; color: var(--yellow);
  text-shadow:
    0 0 22px rgba(255,228,77,1),
    0 0 44px rgba(255,228,77,.6),
    5px 5px 0 var(--hot-pink),
    9px 9px 0 rgba(0,0,0,.5);
}
.t-sub {
  display: block;
  font-size: clamp(2rem,6vw,4.5rem);
  color: var(--hot-pink);
  text-shadow:
    0 0 18px rgba(255,0,120,.85),
    3px 3px 0 #6b003d,
    6px 6px 0 rgba(0,0,0,.45);
}
#intro p {
  font-size: clamp(1rem,2.5vw,1.4rem);
  color: var(--pale-pink); font-weight: 700;
  margin-bottom: 38px; max-width: 480px; line-height: 1.65;
  text-shadow: 0 0 10px rgba(255,179,217,.4);
  position: relative;
}
#start-btn {
  font-family: 'Bangers', cursive;
  font-size: clamp(1.6rem,3.5vw,2.7rem);
  letter-spacing: 5px; color: #1a0033;
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  border: none; padding: 16px 64px; border-radius: 60px;
  cursor: pointer; position: relative;
  box-shadow: 0 8px 0 #7c3800, 0 14px 45px rgba(255,120,0,.5), 0 0 35px rgba(255,228,77,.3);
  animation: btnPulse 1.3s ease-in-out infinite alternate;
  transition: transform .12s, box-shadow .12s;
}
#start-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 0 #7c3800, 0 18px 55px rgba(255,120,0,.65), 0 0 45px rgba(255,228,77,.4); }
#start-btn:active { transform: translateY(6px); box-shadow: 0 3px 0 #7c3800; }
@keyframes btnPulse {
  from { box-shadow: 0 8px 0 #7c3800, 0 14px 45px rgba(255,120,0,.4), 0 0 22px rgba(255,228,77,.2); }
  to   { box-shadow: 0 8px 0 #7c3800, 0 14px 45px rgba(255,120,0,.7), 0 0 45px rgba(255,228,77,.55); }
}
.float-heart {
  position: absolute; pointer-events: none;
  animation: heartFloat var(--d,4s) var(--dl,0s) linear infinite;
}
@keyframes heartFloat {
  0%   { transform: translateY(110vh) rotate(0deg); opacity:0; }
  8%   { opacity:.9; }
  92%  { opacity:.6; }
  100% { transform: translateY(-12vh) rotate(380deg); opacity:0; }
}

/* ========= WIN SCREEN ========= */
#win-screen {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(5,0,14,.94);
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 30px;
}
#win-screen.show { display: flex; }
#win-screen h2 {
  font-family: 'Bangers', cursive;
  font-size: clamp(3rem,8vw,6rem); color: var(--yellow);
  letter-spacing: 5px;
  text-shadow: 0 0 22px rgba(255,228,77,.9), 5px 5px 0 var(--hot-pink), 9px 9px 0 rgba(0,0,0,.5);
  animation: titleBounce 1s ease-in-out infinite alternate; margin-bottom: 14px;
}
#win-screen p { font-size: 1.35rem; color: var(--pale-pink); font-weight:700; margin-bottom:22px; }
#final-score {
  font-family: 'Bangers', cursive;
  font-size: clamp(2.5rem,5.5vw,4.5rem);
  color: var(--yellow);
  text-shadow: 0 0 22px rgba(255,228,77,.85); letter-spacing:3px; margin-bottom:38px;
}
#play-again-btn {
  font-family: 'Bangers', cursive;
  font-size: clamp(1.4rem,3vw,2.4rem); letter-spacing:4px; color:#1a0033;
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  border:none; padding:14px 54px; border-radius:60px; cursor:pointer;
  box-shadow: 0 7px 0 #7c3800, 0 12px 38px rgba(255,120,0,.5);
  transition: transform .12s, box-shadow .12s;
}
#play-again-btn:hover { transform:translateY(-3px); }
#play-again-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #7c3800; }
</style>
</head>
<body>

<!-- FLASH OVERLAY -->
<div id="flash"></div>

<!-- SHOE CURSOR -->
<div id="shoe-cursor">👠</div>

<!-- COMBO -->
<div id="combo-display"></div>

<!-- ============================================================
     INTRO SCREEN
     ============================================================ -->
<div id="intro">
  <span class="intro-shoe">👠</span>
  <h1>
    <span class="t-main">SONDHA'S</span>
    <span class="t-sub">REVENGE</span>
  </h1>
  <p>Hit the Playboy &amp; his Suffering!<br>Every smack feels SO GOOD! 💪✨</p>
  <button id="start-btn" onclick="startGame()">👠 LET'S GO! 👠</button>
</div>

<!-- ============================================================
     WIN SCREEN
     ============================================================ -->
<div id="win-screen">
  <h2>🎉 SONDHA WINS! 🎉</h2>
  <p>You DESTROYED them! Justice served, Queen! 👠💥</p>
  <div id="final-score">Score: <span id="final-score-val">0</span></div>
  <button id="play-again-btn" onclick="resetGame()">🔥 AGAIN! 🔥</button>
</div>

<!-- ============================================================
     BACKGROUND (stars + city + spotlights)
     ============================================================ -->
<div id="bg">
  <!-- NEON CITY SVG -->
  <svg id="city-svg" viewBox="0 0 1920 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">

    <!-- ===== FAR LAYER (darkest purple) ===== -->
    <g fill="#0a001e">
      <rect x="0"   y="280" width="70"  height="200"/>
      <rect x="60"  y="230" width="55"  height="250"/>
      <rect x="105" y="265" width="80"  height="215"/>
      <rect x="175" y="200" width="50"  height="280"/>
      <rect x="215" y="245" width="90"  height="235"/>
      <rect x="295" y="190" width="60"  height="290"/>
      <rect x="345" y="240" width="75"  height="240"/>
      <rect x="410" y="210" width="55"  height="270"/>
      <rect x="455" y="250" width="95"  height="230"/>

            <!-- Tightly shut X-eyes -->
            <line x1="43" y1="55" x2="57" y2="69" stroke="#3d4a5c" stroke-width="5" stroke-linecap="round"/>
            <line x1="57" y1="55" x2="43" y2="69" stroke="#3d4a5c" stroke-width="5" stroke-linecap="round"/>
            <line x1="73" y1="55" x2="87" y2="69" stroke="#3d4a5c" stroke-width="5" stroke-linecap="round"/>
            <line x1="87" y1="55" x2="73" y2="69" stroke="#3d4a5c" stroke-width="5" stroke-linecap="round"/>
            <!-- Wailing mouth -->
            <ellipse cx="65" cy="83" rx="17" ry="11" fill="#2d3640"/>
            <ellipse cx="65" cy="84" rx="13" ry="8"  fill="#1a1f25"/>
            <!-- Multiple tears flying -->
            <path d="M40,65 L28,78"  stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
            <path d="M44,72 L32,88"  stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M88,65 L100,78" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
            <path d="M84,72 L96,88"  stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Stars of pain -->
            <text x="10"  y="45" font-size="16" fill="#a78bfa">✦</text>
            <text x="95"  y="42" font-size="14" fill="#a78bfa">✦</text>
            <text x="16"  y="82" font-size="13" fill="#c4b5fd">⭐</text>
          </g>

        </svg>
      </div>
    </div>

    <!-- GROUND -->
    <div id="ground"></div>
  </div><!-- /arena -->
</div><!-- /game-container -->

<script>
/* ============================================================
   AUDIO ENGINE
   ============================================================ */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let _ctx;

function getCtx() {
  if (!_ctx) _ctx = new AudioContext();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

/* --- THWACK impact sound --- */
function playThwack() {
  const ac = getCtx();
  const buf = ac.createBuffer(1, ac.sampleRate * 0.28, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / ac.sampleRate;
    d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 38)
          * (1 + Math.sin(2 * Math.PI * 180 * t) * 0.55)
          + Math.sin(2 * Math.PI * 85 * t) * Math.exp(-t * 26) * 0.75;
  }
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(1.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.28);
  src.connect(g); g.connect(ac.destination);
  src.start();
}

/* --- AHH! pain vocalization for Playboy --- */
function playAhh() {
  const ac = getCtx();
  const now = ac.currentTime;

  // Pick random variant: 0=high shriek, 1=mid moan, 2=short yelp
  const variant = Math.floor(Math.random() * 3);
  const cfg = [
    { startF: 480, endF: 230, dur: 0.62, vol: 0.5 },  // "AHHH!" descending
    { startF: 290, endF: 185, dur: 0.78, vol: 0.45 }, // "OWWW" sustained
    { startF: 560, endF: 310, dur: 0.45, vol: 0.55 }  // Quick yelp
  ][variant];

  // Main voiced oscillator (sawtooth = rich harmonics like human voice)
  const osc1 = ac.createOscillator();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(cfg.startF, now);
  osc1.frequency.exponentialRampToValueAtTime(
    cfg.endF + (cfg.startF - cfg.endF) * 0.3, now + cfg.dur * 0.18);
  osc1.frequency.linearRampToValueAtTime(cfg.endF, now + cfg.dur);

  // Softer undertone
  const osc2 = ac.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(cfg.startF * 0.5, now);
  osc2.frequency.linearRampToValueAtTime(cfg.endF * 0.5, now + cfg.dur);

  // "AH" vowel formant filters: F1 ≈ 800 Hz, F2 ≈ 1200 Hz
  const f1 = ac.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = 820; f1.Q.value = 10;

  const f2 = ac.createBiquadFilter();
  f2.type = 'bandpass'; f2.frequency.value = 1250; f2.Q.value = 7;

  const g1 = ac.createGain(); g1.gain.value = 0.68;
  const g2 = ac.createGain(); g2.gain.value = 0.32;
  const g3 = ac.createGain(); g3.gain.value = 0.22; // undertone blend

  // Envelope: sharp attack → sustain → decay
  const env = ac.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(cfg.vol, now + 0.04);
  env.gain.setValueAtTime(cfg.vol, now + cfg.dur * 0.22);
  env.gain.exponentialRampToValueAtTime(0.001, now + cfg.dur);

  osc1.connect(f1); osc1.connect(f2);
  f1.connect(g1);   f2.connect(g2);
  osc2.connect(g3);
  g1.connect(env); g2.connect(env); g3.connect(env);
  env.connect(ac.destination);

  osc1.start(now); osc2.start(now);
  osc1.stop(now + cfg.dur); osc2.stop(now + cfg.dur);
}

/* --- GROAN for suffering --- */
function playGroan() {
  const ac = getCtx();
  const now = ac.currentTime;
  const dur = 0.55;
  const osc = ac.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(160, now);
  osc.frequency.linearRampToValueAtTime(115, now + dur);

  const f = ac.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 700; f.Q.value = 6;

  const env = ac.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.42, now + 0.05);
  env.gain.exponentialRampToValueAtTime(0.001, now + dur);

  osc.connect(f); f.connect(env); env.connect(ac.destination);
  osc.start(now); osc.stop(now + dur);
}

/* ============================================================
   GAME STATE
   ============================================================ */
let score = 0, hitCount = 0, combo = 1;
let comboTimer = null, gameActive = false;

const playboyCries =  ['😭 AHH NO!','😢 FORGIVE ME!','💔 HAVE MERCY!','😭 SORRY SORRY!','😩 IT HURTS!!','😭 OUCH BABE!'];
const sufferingReactions = ['💀 JUST END IT!','😵 NO MORE!','🥴 UGHHH!','😫 WHY ME!','💥 THE PAIN!','😤 ENOUGH!'];
const thwackWords = ['THWACK!','SMASH!','POW!','WHAM!','KA-POW!','ZAP!','CRACK!','BAM!'];
const ahhWords   = ['AHH!!','OWWW!','IT HURTS!','MY FACE!','MERCY!!','AGHH!!'];
const groanWords  = ['UGHHH!','NOOO!','WHY??!','THE PAIN!','STOP!!'];
const comboLabels = ['','','','TRIPLE!','QUAD!!','PENTA!!'];

/* ============================================================
   CURSOR
   ============================================================ */
const shoeCursor = document.getElementById('shoe-cursor');
document.addEventListener('mousemove', e => {
  shoeCursor.style.left = e.clientX + 'px';
  shoeCursor.style.top  = e.clientY + 'px';
});

/* ============================================================
   HIT LOGIC
   ============================================================ */
function hitCharacter(who, e) {
  if (!gameActive) return;
  e.stopPropagation();

  const el = document.getElementById(who);

  // Shoe swing
  shoeCursor.classList.remove('swinging');
  void shoeCursor.offsetWidth;
  shoeCursor.classList.add('swinging');

  // Impact sound
  playThwack();

  // Reaction sound + visual
  setTimeout(() => {
    if (who === 'playboy') {
      playAhh();
      spawnAhhText(e.clientX, e.clientY);
      showBubble('playboy-bubble', playboyCries[Math.floor(Math.random() * playboyCries.length)]);
    } else {
      playGroan();
      spawnGroanText(e.clientX, e.clientY);
      showBubble('suffering-bubble', sufferingReactions[Math.floor(Math.random() * sufferingReactions.length)]);
    }
  }, 55);

  // Hit animation (includes pain face via CSS)
  el.classList.remove('hit');
  void el.offsetWidth;
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), 500);

  // Screen flash + shake
  doScreenFlash();
  doScreenShake();

  // Particles + stars
  spawnParticles(e.clientX, e.clientY, who === 'playboy' ? '#ff4444' : '#a055f5');
  spawnStars(el, e);

  // Thwack word
  spawnEffectText(e.clientX, e.clientY);

  // Scoring
  hitCount++;
  combo++;
  score += combo * 10;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 1; }, 2000);
  updateHUD();
  if (combo >= 3) showCombo(combo);

  // Wander
  wanderCharacter(who);
}

/* ── AHH TEXT ── */
function spawnAhhText(x, y) {
  const word = ahhWords[Math.floor(Math.random() * ahhWords.length)];
  const el = document.createElement('div');
  el.className = 'ahh-text';
  el.textContent = word;
  el.style.left = x + 'px';
  el.style.top  = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* ── GROAN TEXT ── */
function spawnGroanText(x, y) {
  const word = groanWords[Math.floor(Math.random() * groanWords.length)];
  const el = document.createElement('div');
  el.className = 'groan-text';
  el.textContent = word;
  el.style.left = x + 'px';
  el.style.top  = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* ── THWACK WORDS ── */
function spawnEffectText(x, y) {
  const word  = thwackWords[Math.floor(Math.random() * thwackWords.length)];
  const colors= ['#ffe44d','#ff4dac','#ff7800','#a855f7','#00ffe5'];
  const el = document.createElement('div');
  el.className = 'effect-text';
  el.textContent = word;
  el.style.left  = x + 'px';
  el.style.top   = y + 'px';
  el.style.color = colors[Math.floor(Math.random() * colors.length)];
  el.style.textShadow = `3px 3px 0 rgba(0,0,0,.6)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

/* ── STARS ── */
function spawnStars(el, e) {
  const emojis = ['⭐','💫','✨','💥','🌟','💢','❤️‍🔥','⚡'];
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const star  = document.createElement('div');
    star.className = 'hit-star';
    star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 * i / 6) + Math.random() * 0.6;
    const dist  = 65 + Math.random() * 70;
    star.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    star.style.setProperty('--ty', Math.sin(angle) * dist - 45 + 'px');
    star.style.left = (rect.left + rect.width  / 2) + 'px';
    star.style.top  = (rect.top  + rect.height / 2) + 'px';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 800);
  }
}

/* ── PARTICLES ── */
function spawnParticles(x, y, color) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz  = 5 + Math.random() * 10;
    const ang = (Math.PI * 2 * i / count) + Math.random() * 0.4;
    const dst = 55 + Math.random() * 90;
    const dur = (0.45 + Math.random() * 0.3).toFixed(2) + 's';
    const hue = Math.random() > 0.5 ? color : '#ffe44d';
    p.style.cssText = `
      width:${sz}px; height:${sz}px; background:${hue};
      box-shadow: 0 0 8px ${hue}; left:${x}px; top:${y}px;
      --px:${Math.cos(ang)*dst}px; --py:${Math.sin(ang)*dst}px; --dur:${dur};`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

/* ── EMOTION BUBBLE ── */
function showBubble(id, text) {
  const b = document.getElementById(id);
  b.textContent = text;
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 1400);
}

/* ── COMBO ── */
function showCombo(n) {
  const el = document.getElementById('combo-display');
  const label = n <= 5 ? (comboLabels[n] || n + 'x COMBO!') : n + 'x ULTRA!!';
  el.textContent = label;
  const colors = ['','','','#ffe44d','#ff4dac','#00ffe5'];
  el.style.color = n <= 5 ? (colors[n] || '#ff0088') : '#ff0088';
  el.style.textShadow = `5px 5px 0 rgba(0,0,0,.5), 0 0 30px currentColor`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

/* ── SCREEN SHAKE ── */
function doScreenShake() {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 450);
}

/* ── SCREEN FLASH ── */
function doScreenFlash() {
  const f = document.getElementById('flash');
  f.classList.remove('do-flash');
  void f.offsetWidth;
  f.classList.add('do-flash');
  setTimeout(() => f.classList.remove('do-flash'), 300);
}

/* ── WANDER ── */
function wanderCharacter(id) {
  const el = document.getElementById(id);
  const arenaW = document.getElementById('arena').offsetWidth;
  const minX = 90, maxX = arenaW - 90;
  const ranges = id === 'playboy'
    ? [minX, arenaW * 0.48]
    : [arenaW * 0.52, maxX];
  const newX = ranges[0] + Math.random() * (ranges[1] - ranges[0]);
  el.style.transition = 'left 0.42s cubic-bezier(0.25,0.46,0.45,0.94)';
  el.style.left = newX + 'px';
}

/* ── HUD ── */
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('hits').textContent  = hitCount;
  document.getElementById('combo').textContent = 'x' + combo;
}

/* ============================================================
   BACKGROUND: STARS
   ============================================================ */
function makeStars() {
  const bg = document.getElementById('bg');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.8 + 0.8;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*65}%;
      --d:${(1.5+Math.random()*2.5).toFixed(1)}s;
      --dl:${(Math.random()*3).toFixed(1)}s;`;
    bg.appendChild(s);
  }
}

/* ============================================================
   INTRO HEARTS
   ============================================================ */
function makeHearts() {
  const intro = document.getElementById('intro');
  const items = ['💕','💖','💗','❤️','🌸','✨','⭐','💫','🩷'];
  for (let i = 0; i < 15; i++) {
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = items[Math.floor(Math.random() * items.length)];
    h.style.cssText = `
      font-size:${1.2 + Math.random()*1.5}rem;
      left:${Math.random()*100}%;
      --d:${(3+Math.random()*3.5).toFixed(1)}s;
      --dl:${(Math.random()*4).toFixed(1)}s;`;
    intro.appendChild(h);
  }
}

/* ============================================================
   GAME FLOW
   ============================================================ */
function startGame() {
  document.getElementById('intro').style.display = 'none';
  gameActive = true;
  score = 0; hitCount = 0; combo = 1;
  updateHUD();
}

function resetGame() {
  document.getElementById('win-screen').classList.remove('show');
  gameActive = true;
  score = 0; hitCount = 0; combo = 1;
  updateHUD();
  const arena = document.getElementById('arena');
  const w = arena.offsetWidth;
  const pb = document.getElementById('playboy');
  const sf = document.getElementById('suffering');
  pb.style.transition = 'none'; sf.style.transition = 'none';
  pb.style.left = '26%'; sf.style.left = '72%';
}

/* ============================================================
   INIT
   ============================================================ */
makeStars();
makeHearts();
</script>
</body>
